<form th:action="@{/adicionar-item-cardapio/{id}(id=${id_restaurante})}" th:object="${itemCardapio}" method="post">
    <label for="nome">Nome: </label>
    <input type="text" th:field="*{nome}" id="nome">
    <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
    <br/>
    <label for="descricao">Descrição:</label>
    <input type="text" th:field="*{descricao}" id="descricao">
    <br/>
    <label for="preco">Preço:</label>
    <input double="text" th:field="*{preco}" id="preco">
    <br/>
    <input type="submit" value="Adicionar">
</form>
